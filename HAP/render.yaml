services:
  - type: web
    name: hap-api
    runtime: node
    rootDir: .
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: RATE_LIMIT_TTL
        value: 60
      - key: RATE_LIMIT_LIMIT
        value: 100
      - key: CORS_ORIGINS
        sync: false
      - key: SWAGGER_ENABLED
        value: "false"
      - key: SWAGGER_PATH
        value: docs
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_DEPARTMENT
        value: Administration
      - key: SUPPORT_EMAIL
        sync: false
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_FROM
        value: ""

  - type: static
    name: hap-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    publishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        sync: false
